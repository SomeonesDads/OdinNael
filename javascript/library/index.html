<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>My Library</h1>

    
    <div id="library"></div>
    <div id="newbook" style="padding-top:2rem">
        <button command="show-modal" commandfor="input-dialog">
            New Book
        </button>
        <dialog id="input-dialog">
            <form method="dialog" id="book-form">
                <h2>Add New Book</h2>
                <div class="form-group">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="author">Author:</label>
                    <input type="text" id="author" name="author" required>
                </div>
                <div class="form-group">
                    <label for="pages">Pages:</label>
                    <input type="number" id="pages" name="pages" required min="1">
                </div>
                <div class="form-group checkbox-group">
                    <label for="read">Have you read it?</label>
                    <input type="checkbox" id="read" name="read">
                </div>
                <div class="form-actions">
                    <button type="button" id="close-dialog">Cancel</button>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </dialog>
    </div>
    <script src="book.js"></script>
</body>
</html>
